trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/ui/**
      - azure-pipelines-fe.yml
    exclude:
      - app/api/**
      - README.md

variables:
  acrLoginServer: 'zafacr-gqfyc3h8eya2djey.azurecr.io'
  acrName: 'zafacr'
  resourceGroup: 'Zenlabs-Agent-Foundry'
  frontendAppName: 'payment-orchestrator-fe'
  frontendRepo: 'payment-orchestrator-fe'
  viteApiBaseUrl: 'https://payment-orchestrator-be.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io'
  tag: 'latest'

stages:
- stage: Build
  displayName: Build & Push Frontend Image
  jobs:
    - job: BuildFrontend
      displayName: Build Frontend Docker Image
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self
        - task: Docker@2
          displayName: Build and Push Frontend Image
          inputs:
            command: buildAndPush
            repository: $(frontendRepo)
            dockerfile: $(Build.SourcesDirectory)/app/ui/Dockerfile
            containerRegistry: 'zafacr-service-connection'
            tags: |
              $(tag)
              $(Build.BuildId)
            arguments: --build-arg VITE_API_BASE_URL=$(viteApiBaseUrl)

- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  condition: succeeded()
  jobs:
    - deployment: DeployFrontend
      displayName: Deploy Frontend to ACA
      pool:
        vmImage: 'ubuntu-latest'
      environment: production
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - task: AzureCLI@2
                displayName: Deploy to Container Apps
                inputs:
                  azureSubscription: 'Zenlabs-agent-foundry-connection'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    az containerapp update \
                      --name $(frontendAppName) \
                      --resource-group $(resourceGroup) \
                      --image $(acrLoginServer)/$(frontendRepo):$(Build.BuildId) \
                      --revision-suffix "build-$(Build.BuildId)"
