trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/api/**
      - app/config/**
      - app/shared/**
      - app/agents/**
      - app/workflows/**
      - app/db/**
      - app/observability/**
      - app/workers/**
      - app/services/**
      - Dockerfile.refactored
      - requirements_refactored.txt
    exclude:
      - app/ui/**
      - README.md

variables:
  acrLoginServer: 'zafacr-gqfyc3h8eya2djey.azurecr.io'
  acrName: 'zafacr'
  resourceGroup: 'Zenlabs-Agent-Foundry'
  backendAppName: 'payment-orchestrator-be'
  backendRepo: 'payment-orchestrator-be'
  tag: 'latest'

stages:
- stage: Build
  displayName: Build & Push Backend Image
  jobs:
    - job: BuildBackend
      displayName: Build Backend Docker Image
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self
        - task: Docker@2
          displayName: Build and Push Backend Image
          inputs:
            command: buildAndPush
            repository: $(backendRepo)
            dockerfile: $(Build.SourcesDirectory)/Dockerfile.refactored
            containerRegistry: 'zafacr-service-connection'
            tags: |
              $(tag)
              $(Build.BuildId)

- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  condition: succeeded()
  jobs:
    - deployment: DeployBackend
      displayName: Deploy Backend to ACA
      pool:
        vmImage: 'ubuntu-latest'
      environment: production
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - task: AzureCLI@2
                displayName: Deploy to Container Apps
                inputs:
                  azureSubscription: 'Zenlabs-agent-foundry-connection'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    az containerapp update \
                      --name $(backendAppName) \
                      --resource-group $(resourceGroup) \
                      --image $(acrLoginServer)/$(backendRepo):$(Build.BuildId) \
                      --revision-suffix "build-$(Build.BuildId)" \
                      --set-env-vars \
                        APP_ENV=production \
                        CORS_ALLOWED_ORIGINS="https://payment-orchestrator-fe.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io,http://localhost:5174,http://localhost:5173"\
                        AZURE_OPENAI_ENDPOINT="@keyvault(Zenlabs-Agent-Foundry-openai-endpoint)" \
                        AZURE_OPENAI_API_KEY="@keyvault(Zenlabs-Agent-Foundry-openai-key)" \
                        CORS_ALLOWED_ORIGINS="https://payment-orchestrator-fe.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io"
